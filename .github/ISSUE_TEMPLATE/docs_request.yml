name: Documentation Request
description: Request new or improved documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation Gap
      description: What is missing, unclear, stale, or hard to find?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Who needs this documentation?
      placeholder: Operators, contributors, trusted viewers, agents, etc.
    validations:
      required: false
  - type: textarea
    id: suggested-location
    attributes:
      label: Suggested Location
      description: Where should this live?
      placeholder: README.md, DEVELOPMENT.md, DEPLOYMENT.md, ARCHITECTURE.md, AGENTS.md, etc.
    validations:
      required: false
